# See https://github.com/typesafegithub/github-actions-typing

inputs:
  version:
    type: string
  architecture:
    type: enum
    allowed-values:
      - x86_64
      - aarch64
  platform:
    type: enum
    allowed-values:
      - linux
      - apple
      - windows
  save-cache:
    type: boolean
  working-directory:
    type: string
  github-token:
    type: string

outputs:
  acton-path:
    type: string
  acton-version:
    type: string
  cache-hit:
    type: boolean
