name: "ton-blockchain/setup-acton"
description: "Set up a specific version of Acton and add the command-line tools to the PATH."
author: "TON Core"

inputs:
  version:
    description: "The version of Acton to install e.g., `0.3.2`. Defaults to the version in Acton.toml or 'latest'."
    required: false
  architecture:
    description:
      "Target architecture. Supported values: x86_64, aarch64. Auto-detected from the runner if not specified."
    required: false
  platform:
    description:
      "Target platform. Supported values: linux, apple, windows. Auto-detected from the runner if not specified."
    required: false
  save-cache:
    description: "Enable cache restore and post-run save of the resolved Acton binary path. Defaults to true."
    default: "true"
    required: false
  working-directory:
    description: "Working directory for the Acton project. Defaults to the GitHub workspace."
    default: ${{ github.workspace }}
    required: false
  github-token:
    description: "GitHub token used to authenticate API requests when fetching releases."
    default: ${{ github.token }}
    required: false

outputs:
  acton-path:
    description: "Path to the installed Acton binary."
  acton-version:
    description: "The installed Acton version reported by acton --version."
  cache-hit:
    description: "Whether the Acton binary was restored from GitHub Actions cache."

runs:
  using: "node24"
  main: "dist/setup/index.js"
  post: "dist/save-cache/index.js"
  post-if: success()

branding:
  icon: "package"
  color: "blue"
